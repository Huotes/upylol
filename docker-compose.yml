# ╔══════════════════════════════════════════════════════════════╗
# ║  UPYLOL — Docker Compose (base)                             ║
# ║  Uso: docker compose up -d                                  ║
# ║  Dev:  docker compose -f docker-compose.yml                 ║
# ║        -f docker-compose.dev.yml up                         ║
# ║  Prod: docker compose -f docker-compose.yml                 ║
# ║        -f docker-compose.prod.yml up -d                     ║
# ╚══════════════════════════════════════════════════════════════╝

services:
  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upylol-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-upylol}:${DB_PASSWORD:-upylol}@db:5432/${DB_NAME:-upylol}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upylol-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_DDRAGON_VERSION=${DDRAGON_VERSION:-15.3.1}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: upylol-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-upylol}
      POSTGRES_USER: ${DB_USER:-upylol}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-upylol}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - internal
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-upylol} -d ${DB_NAME:-upylol}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: upylol-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
    volumes:
      - redisdata:/data
    networks:
      - internal
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Nginx (Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: upylol-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  nginx-cache:
    driver: local
